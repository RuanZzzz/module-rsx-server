services:
  mysql:
    image: mysql:8.4
    container_name: module-rsx-compose-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: module_rsx
    ports:
      # 本机 3306 可能已经被你当前的 MySQL 容器占用，所以 Compose 版映射到 3307。
      - "3307:3306"
    volumes:
      # MySQL 数据必须放在 volume 里，否则容器重建后数据库内容会丢失。
      - mysql_data:/var/lib/mysql
      # 首次初始化数据库时自动执行项目里的建表和种子数据脚本。
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: module-rsx-compose-redis
    ports:
      # 本机 6379 如果没有被占用，可以直接映射到 Redis 默认端口。
      - "6379:6379"
    volumes:
      # Redis 数据放到 volume 里，后续接入缓存或登录态时不会因为容器重建直接丢失。
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: .
    image: module-rsx-server:local
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: module_rsx
      DB_USERNAME: root
      DB_PASSWORD: root
      # 容器之间不要写 localhost，后端通过 Compose 服务名 redis 访问 Redis 容器。
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # 容器内写 /app/uploads，实际文件通过下面的挂载保存到宿主机 ./uploads。
      UPLOAD_ROOT_DIR: /app/uploads
    ports:
      # 使用端口范围后，docker compose --scale server=2 可以把两个后端实例分别映射到 8083 和 8084。
      - "8083-8084:8082"
    volumes:
      # 上传文件挂到宿主机目录，容器删除或重建后图片不会跟着丢。
      - ./uploads:/app/uploads
      # 应用日志挂到宿主机目录，容器重建后历史日志仍然保留在 ./logs。
      - ./logs:/app/logs

  admin:
    build:
      context: ../module-rsx-admin
    image: module-rsx-admin:local
    depends_on:
      - server
    ports:
      # 前端 nginx 对外暴露 8085，容器内 80 负责页面和 /api 转发。
      - "8085:80"

  web:
    build:
      context: ../module-rsx-web
    image: module-rsx-web:local
    depends_on:
      - server
    ports:
      # 前台门户对外暴露 8086，和管理端 8085 分开。
      - "8086:80"

volumes:
  mysql_data:
  redis_data:
